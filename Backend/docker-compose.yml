version: '3'

services:
  node-app:
    build: .
    image: node-app
    environment:
      - mongodb+srv://admin:1234@cluster0.vosswk8.mongodb.net/?retryWrites=true&w=majority&appName=Cluster0
    ports:
      - '3001:3001'
    depends_on:
      - mongodb
    volumes:
      - .:/usr/src/node-app
    networks:
      - node-network


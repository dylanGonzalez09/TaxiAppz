config:
  target: 'https://rwqqfvpn-3001.inc1.devtunnels.ms/v1'
  phases:
    - duration: 1
      arrivalRate: 18
  payload:
    path: './users.csv'
    fields: ['clientid', 'token', 'vehicle_type']

scenarios:
  - name: 'Multiple Users Test'
    flow:
      - post:
          url: '/api/request/create'
          headers:
            clientid: '{{ clientid }}'
            Authorization: '{{ token }}'
            Content-Type: 'application/json'
          json:
            pick_lat: 11.0149357
            pick_lng: 76.9826744
            pick_address: 'Pickup location'
            drop_lat: 11.0170946
            drop_lng: 76.9852586
            drop_address: 'Drop location'
            booking_for: 'MYSELF'
            payment_opt: 'CASH'
            ride_type: 'RIDE_NOW'
            trip_type: 'LOCAL'
            vehicle_type: '{{ vehicle_type }}'
            isLater: false
            estimatedAmount: 50
import java.util.Properties
import java.io.FileInputStream
plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics' // Ensure this is at the bottom
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keystoreProperties =new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.taxi_appz.driver"
    compileSdk = 36
    ndkVersion = "27.0.12077973"

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile file(keystoreProperties['storeFile'])
            storePassword keystoreProperties['storePassword']
        }
    }


    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId = "com.taxi_appz.driver"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = 35
        versionCode = 1
        versionName "1.6"
        signingConfig signingConfigs.release
        setProperty("archivesBaseName", "$parent.name-$versionName")
        multiDexEnabled true
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            signingConfig = signingConfigs.getByName("release")
            manifestPlaceholders = [MAPS_API_KEY: "AIzaSyCQfNaQrCTPRTprm_WC0HvDfhca_SXXvT4"]
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }

        debug {
            manifestPlaceholders = [MAPS_API_KEY: "AIzaSyCQfNaQrCTPRTprm_WC0HvDfhca_SXXvT4"]
        }
    }
    lintOptions {
        disable 'InvalidPackage'
        checkReleaseBuilds false
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:2.2.10"
    implementation "com.google.firebase:firebase-messaging:24.1.1"
    implementation "androidx.core:core-ktx:1.16.0"
}

// Add task dependencies to ensure correct order
tasks.whenTaskAdded { task ->
    if (task.name == 'mapDebugSourceSetPaths') {
        task.dependsOn 'processDebugGoogleServices'
    }
}

name: taxiappzpro
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev



version: 1.0.0+1

environment:
  sdk: ^3.5.1


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  fpdart: ^1.1.0
  flutter_bloc: ^9.1.1
  get_it: ^8.0.3
  intl: ^0.20.2
  injectable: ^2.5.0
  dio: ^5.7.0
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  go_router: ^15.1.2
  get: ^4.6.6
  cached_network_image: ^3.4.1
  google_maps_flutter: ^2.12.1
  flutter_svg: ^2.2.1
  path_provider: ^2.1.5
  json_annotation: ^4.9.0
  package_info_plus: ^8.3.0
  firebase_core: ^3.15.2
  firebase_messaging: ^15.1.6
  permission_handler: ^12.0.0+1
  app_settings: ^6.1.1
  device_info_plus: ^11.4.0
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  mqtt_client: ^10.5.1
  flutter_foreground_task: ^9.1.0
  geolocator: ^14.0.0
  flutter_local_notifications: ^19.2.0
  flutter_html:
  audioplayers: ^6.1.0
  connectivity_plus: ^6.1.1
  share_plus: ^11.0.0
  shimmer: ^3.0.0
  photo_manager: ^3.6.3
  location: ^8.0.0
  flutter_polyline_points: ^2.1.0
  text_scroll: ^0.2.1
  pdf: ^3.3.0
  printing: ^5.9.0
  webview_flutter: ^4.4.2
  screenshot: ^3.0.0
  flutter_native_contact_picker: ^0.0.10
  url_launcher: ^6.3.1
  flutter_activity_recognition: ^4.0.0
  battery_plus: ^6.2.1
  camera_android_camerax: ^0.6.14+1
  fluttertoast: ^8.2.12
  google_maps_flutter_android: ^2.16.0
  firebase_crashlytics: ^4.3.5
  http: ^1.3.0
  animated_text_kit: ^4.2.3
  overlay_windows_plugin:
    path: packages/overlay_windows_plugin-0.0.5
  flutter_colorpicker: ^1.1.0
  razorpay_flutter: ^1.4.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  json_serializable: ^6.8.0

flutter:

  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/

  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/lato_regular.ttf
          weight: 400
          style: normal
        - asset: assets/fonts/lato_black.ttf
          weight: 500
          style: normal
        - asset: assets/fonts/lato_semi_bold.ttf
          weight: 600
        - asset: assets/fonts/lato_bold.ttf
          weight: 700
          style: normal
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
